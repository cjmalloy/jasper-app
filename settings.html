<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Jasper Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="settings.css">
  <script src="settings-renderer.js" defer></script>
</head>
<body>
<h1>Jasper Application Settings</h1>
<div class="label-column">

  <label for="locale">Language</label>
  <div class="form-array">
    <select id="locale" data-setting>
      <option value="en">English</option>
      <option value="ja">日本語</option>
    </select>
  </div>

  <label for="appVersion">App Version</label>
  <div class="form-array">
    <input id="appVersion" type="text" data-setting disabled>
    <div title="Check for updates on startup" class="au"><label for="autoUpdate">🔄</label><input id="autoUpdate" type="checkbox" data-setting data-patch></div>
  </div>

  <label for="serverVersion">Server Version</label>
  <div class="form-array">
    <input id="serverVersion" type="text" data-setting>
    <select id="server" class="version" data-version-target="serverVersion">
      <option>latest</option>
      <option>v1</option>
      <option>v1.3</option>
    </select>
    <div title="Check for updates on startup" class="au"><label for="pullServer">🔄</label><input id="pullServer" type="checkbox" data-setting></div>
  </div>

  <label for="serverPort">Server Port</label>
  <input id="serverPort" type="text" data-setting>

  <label for="serverProfiles">Server Profiles</label>
  <div class="cb">
    <span><input type="checkbox" id="serverProfiles_scripts" data-profile="scripts"><label for="serverProfiles_scripts">Server Scripts</label></span>
    <span><input type="checkbox" id="serverProfiles_proxy" data-profile="proxy"><label for="serverProfiles_proxy">Proxy</label></span>
    <span><input type="checkbox" id="serverProfiles_file-cache" data-profile="file-cache"><label for="serverProfiles_file-cache">File Cache</label></span>
    <span><input type="checkbox" id="serverProfiles_recycler" data-profile="recycler"><label for="serverProfiles_recycler">Recycler</label></span>
    <span><input type="checkbox" id="serverProfiles_preload" data-profile="preload"><label for="serverProfiles_preload">Preload</label></span>
    <span><input type="checkbox" id="serverProfiles_debug" data-profile="debug"><label for="serverProfiles_debug">Debug</label></span>
  </div>

  <span></span>
  <input id="serverProfiles" type="text" data-setting>

  <label for="serverDefaultRole">Default Role</label>
  <div class="form-array">
    <select id="serverDefaultRole" data-setting>
      <option value="ROLE_ADMIN">admin</option>
      <option value="ROLE_MOD">mod</option>
      <option value="ROLE_EDITOR">editor</option>
      <option value="ROLE_USER">user</option>
      <option value="ROLE_VIEWER">viewer</option>
      <option value="ROLE_ANONYMOUS">anon</option>
    </select>
  </div>

  <label for="serverRam">Server RAM</label>
  <input id="serverRam" type="text" data-setting>

  <label for="storageDir">Server Storage</label>
  <div class="form-array">
    <input id="storageDir" type="text" data-setting>
    <button type="button" data-open-dir="storageDir">📂️</button>
  </div>

  <label for="clientVersion">UI Version</label>
  <div class="form-array">
    <input id="clientVersion" type="text" data-setting>
    <select id="client" class="version" data-version-target="clientVersion">
      <option>latest</option>
      <option>v1</option>
      <option>v1.3</option>
    </select>
    <div title="Check for updates on startup" class="au"><label for="pullClient">🔄</label><input id="pullClient" type="checkbox" data-setting></div>
  </div>

  <label for="clientTitle">UI Title</label>
  <input id="clientTitle" type="text" data-setting>

  <label for="clientPort">UI Port</label>
  <input id="clientPort" type="text" data-setting>

  <label for="databaseVersion">Postgres Version</label>
  <div class="form-array">
    <input id="databaseVersion" type="text" data-setting>
    <select id="database" class="version" data-version-target="databaseVersion">
      <option>latest</option>
      <option>18</option>
      <option>17</option>
      <option>16</option>
      <option>15</option>
      <option>14</option>
      <option>13</option>
      <option>12</option>
      <option>11</option>
    </select>
    <div title="Check for updates on startup" class="au"><label for="pullDatabase">🔄</label><input id="pullDatabase" type="checkbox" data-setting></div>
  </div>

  <label for="dataDir">Postgres Directory</label>
  <div class="form-array">
    <input id="dataDir" type="text" data-setting>
    <button type="button" data-open-dir="dataDir">📂️</button>
  </div>

  <label for="sshVersion">SSH Version</label>
  <div class="form-array">
    <input id="sshVersion" type="text" data-setting>
    <select id="ssh" class="version" data-version-target="sshVersion">
      <option>latest</option>
      <option>v1</option>
      <option>v1.3</option>
    </select>
    <div title="Check for updates on startup" class="au"><label for="pullSsh">🔄</label><input id="pullSsh" type="checkbox" data-setting></div>
  </div>

  <label for="sshPort">SSH Port</label>
  <input id="sshPort" type="text" data-setting>

  <label for="cfToken">Cloudflare Token</label>
  <input id="cfToken" type="text" data-setting>

  <label for="ngrokUrl">Ngrok URL</label>
  <input id="ngrokUrl" type="text" data-setting>

  <label for="ngrokToken">Ngrok Token</label>
  <input id="ngrokToken" type="text" data-setting>

  <label for="showLogsOnStart">Show Logs on Startup</label>
  <div><input id="showLogsOnStart" type="checkbox" data-setting data-patch></div>

  <span><!-- Buttons --></span>
  <div>
    <button id="save-settings" type="button">Save & Hard Reload</button>
  </div>
</div>
<br>
<hr>
<h2>Troubleshooting</h2>
<div class="label-column">

  <button id="restart-button" type="button" data-command="restart">Restart</button>
  <span id="restart-loading" class="loading">...</span>
  <label>Restart the servers and database</label>

  <button id="pull-button" type="button" data-command="pull">Pull New Images</button>
  <span id="pull-loading" class="loading">...</span>
  <label>Check for updates and download them if available</label>

  <button id="down-button" type="button" data-command="down">Stop</button>
  <span id="down-loading" class="loading">...</span>
  <label>Stop all servers and database</label>

  <button id="up-button" type="button" data-command="up">Start</button>
  <span id="up-loading" class="loading">...</span>
  <label>Start all servers and database if not already started</label>

  <button id="pause-button" type="button" data-command="pause">Pause</button>
  <span id="pause-loading" class="loading">...</span>
  <label>Pause all servers and database</label>

  <button id="unpause-button" type="button" data-command="unpause">Unpause</button>
  <span id="unpause-loading" class="loading">...</span>
  <label>Unpause all servers and database</label>
</div>
</body>
</html>
