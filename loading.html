<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <title>Jasper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css">
  <style>
    body {
      /* Prevent bright flash while loading */
      background-color: black;
      background-image: url("jasper-dark.png");
      background-blend-mode: soft-light;
      background-position: center center;
      background-repeat: no-repeat;
      animation: fadein 5s ease-in-out;
      animation-iteration-count: infinite;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    #log-container {
      position: absolute;
      top: calc(50% + 100px);
      left: 8px;
      right: 8px;
      bottom: 0;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, transparent, #FFF 10%, #FFF 100%);
    }
    #log-container .xterm-viewport {
      overflow-y: hidden;
    }
    @keyframes fadein {
      from {
        background-color: black;
      }
      50% {
        background-color: #212121;
      }
      to {
        background-color: black;
      }
    }
  </style>
  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
</head>
<body>
<div id="log-container"></div>
<script>
  const term = new Terminal({
    disableStdin: true,
    convertEol: true,
    scrollback: 1000,
    fontFamily: 'monospace',
    allowTransparency: true,
    theme: {
      background: 'rgba(0, 0, 0, 0)',
      foreground: '#AAA',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('log-container'));
  fitAddon.fit();
  window.addEventListener('resize', () => fitAddon.fit());
  window.electronAPI.streamLogs((event, data) => {
    term.write(data, () => term.scrollToBottom());
  });
</script>
</body>
</html>
