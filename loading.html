<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <title>Jasper</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="vendor/xterm.css">
  <style>
    body {
      /* Prevent bright flash while loading */
      background-color: black;
      background-image: url("jasper-dark.png");
      background-blend-mode: soft-light;
      background-position: center center;
      background-repeat: no-repeat;
      animation: fadein 5s ease-in-out;
      animation-iteration-count: infinite;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    #log-container {
      position: absolute;
      top: calc(50% + 100px);
      left: 8px;
      right: 8px;
      bottom: 0;
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to bottom, transparent, #FFF 10%, #FFF 100%);
    }
    #log-container .xterm-viewport {
      overflow-y: hidden;
      background-color: transparent !important;
    }
    #log-container .xterm,
    #log-container .xterm-screen {
      background-color: transparent !important;
    }
    @keyframes fadein {
      from {
        background-color: black;
      }
      50% {
        background-color: #212121;
      }
      to {
        background-color: black;
      }
    }
  </style>
  <script>
    // Register the listener immediately so no logs are dropped even if
    // terminal setup below fails or is delayed.
    let term = null;
    const pending = [];
    window.electronAPI.streamLogs((event, data) => {
      if (term) {
        term.write(data, () => term.scrollToBottom());
      } else {
        pending.push(data);
      }
    });
  </script>
  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
</head>
<body>
<div id="log-container"></div>
<script>
  const t = new Terminal({
    disableStdin: true,
    convertEol: true,
    scrollback: 1000,
    fontFamily: 'monospace',
    allowTransparency: true,
    theme: {
      background: 'rgba(0, 0, 0, 0)',
      foreground: '#AAA',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  t.loadAddon(fitAddon);
  t.open(document.getElementById('log-container'));
  fitAddon.fit();
  window.addEventListener('resize', () => fitAddon.fit());
  term = t;
  // Push the cursor to the last row so logs are bottom-aligned and
  // scroll upwards as new lines arrive.
  if (t.rows > 1) t.write('\n'.repeat(t.rows - 1));
  while (pending.length) term.write(pending.shift());
  term.scrollToBottom();
  window.electronAPI.fetchLogs();
</script>
</body>
</html>
