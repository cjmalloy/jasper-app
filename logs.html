<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="referrer" content="no-referrer">
  <title>Jasper Logs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="vendor/xterm.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #242424;
    }
    #terminal {
      height: 100%;
    }
  </style>
  <script>
    // Register the listener immediately so no logs are dropped even if
    // terminal setup below fails or is delayed.
    let term = null;
    const pending = [];
    window.electronAPI.streamLogs((event, data) => {
      if (term) {
        term.write(data);
      } else {
        pending.push(data);
      }
    });
  </script>
  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-fit.js"></script>
</head>
<body>
<div id="terminal"></div>
<script>
  const t = new Terminal({
    disableStdin: true,
    convertEol: true,
    scrollback: 10000,
    fontFamily: 'monospace',
    theme: {
      background: '#242424',
      foreground: '#c9c9c9',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  t.loadAddon(fitAddon);
  t.open(document.getElementById('terminal'));
  fitAddon.fit();
  const sendSize = () => window.electronAPI.resizePty({ cols: t.cols, rows: t.rows });
  sendSize();
  window.addEventListener('resize', () => {
    fitAddon.fit();
    sendSize();
  });
  term = t;
  while (pending.length) term.write(pending.shift());
  window.electronAPI.fetchLogs();
</script>
</body>
</html>
